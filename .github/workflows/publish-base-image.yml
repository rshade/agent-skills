name: Publish Base Test Image

on:
  push:
    branches: [main]
    paths:
      - 'tests/base/**'
  workflow_dispatch:

jobs:
  publish:
    name: Build & Push skill-test-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: tests/base
          file: tests/base/Dockerfile
          push: true
          tags: |
            ghcr.io/rshade/agent-skills/skill-test-base:latest
            ghcr.io/rshade/agent-skills/skill-test-base:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
